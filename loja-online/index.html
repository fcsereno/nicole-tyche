<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nicole Tyche · Loja</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <div class="brand">Nicole Tyche</div>
  <h1 class="title">Le Petit Catalogue</h1>
  <div class="tagline">
    <span class="line"></span>
    <span class="text">doçaria fina · encomendas</span>
    <span class="line"></span>
  </div>
</header>

<main class="sheet">

  <section class="part">
    <div class="part-label">Parte I</div>
    <h2 class="part-title">Les Petits · Docinhos</h2>
  </section>

  <div class="grid" id="grid-docinhos"></div>

  <section class="part with-logo part-break">
    <div class="part-label">Parte II</div>
    <h2 class="part-title">Les Gâteaux · Bolos</h2>
  </section>

  <div class="grid" id="grid-bolos"></div>

</main>

<footer class="footer">
  <div class="row">
    <span class="label">confeitaria artesanal</span>
    <span class="sep"></span>
    <a href="https://wa.me/5522999484026">WhatsApp (22) 99948-4026</a>
  </div>
</footer>

<!-- BOTÃO FLUTUANTE DO CARRINHO -->
<button id="cart-toggle" class="cart-toggle" aria-label="Abrir carrinho">
  <span class="cart-icon">🛍</span>
  <span id="cart-count" class="cart-count">0</span>
</button>

<!-- PAINEL DO CARRINHO -->
<div id="cart-backdrop" class="cart-backdrop"></div>
<aside id="cart-panel" class="cart-panel">
  <div class="cart-header">
    <h3>Seu pedido</h3>
    <button id="cart-close" class="cart-close" aria-label="Fechar carrinho">×</button>
  </div>
  <div id="cart-items" class="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total</span>
      <span id="cart-total-value">R$ 0,00</span>
    </div>
    <button id="cart-checkout" class="cart-checkout" disabled>Finalizar pedido no WhatsApp</button>
  </div>
</aside>

<script src="products.js"></script>
<script src="cart.js"></script>
<script src="app.js"></script>
</body>
</html>
